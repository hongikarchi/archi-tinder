[build]
# `migrate --noinput` runs on every deploy. Migrations are idempotent
# (no-op when already applied) so this is safe and hardens deploys against
# future schema additions (e.g. PROF2 / BOARD1 / Phase 14+) without
# requiring manual `manage.py migrate` runs from a Railway shell.
buildCommand = "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput"

[deploy]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
